<!DOCTYPE html>
<html lang="cn">
<head>
    <meta charset="UTF-8">
    <title>CODEEDITER v1.0.3</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
</head>
<body>
<div id="toolbar">
    <button id="runBtn">Run</button>
    <select id="pluginSelector">
        <option value="auto" selected>自动检测</option>
        <option value="python">Python</option>
        <option value="javascript">JavaScript</option>
        <option value="typescript">TypeScript</option>
        <option value="java">Java</option>
        <option value="cpp">C/C++</option>
        <option value="go">Go</option>
        <option value="rust">Rust</option>
        <option value="ruby">Ruby</option>
        <option value="php">PHP</option>
        <option value="kotlin">Kotlin</option>
        <option value="lua">Lua</option>
        <option value="bash">Bash</option>
        <option value="dart">Dart</option>
        <option value="r">R</option>
        <option value="swift">Swift</option>
        <option value="html">HTML</option>
    </select>
    <span id="currentLang">Python</span>
</div>

<div id="container">
    <div id="editor-container">
        <textarea id="editor">// 写点什么...</textarea>
        <div id="output"></div>
    </div>
    <div id="splitter"></div>
    <canvas id="minimap"></canvas>
</div>

<!-- 初始化覆盖层 -->
<div id="init-overlay" class="hidden">
    <div id="init-content">
        <div id="init-title">正在初始化</div>
        <div id="init-stage">准备中...</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
<script src="renderer.js"></script>
</body>
</html>
